<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Back2Owner Login</title>
 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
<link rel="stylesheet" href="CSS/style.css">
  
</head>
<body class="login-page">
  <div class="login-card fade-in">
    <div class="login-logo">Back2Owner</div>
    <div class="login-tagline">A smarter way to return what's lost</div>
    <form id="authform" autocomplete="off" class="form-group">
      <div class="input-field">
          <input type="email" id="email" placeholder="enter your email" required>
        </div>
        <div class="input-field">
          <input type="password" id="password" placeholder="enter your password" required>
          <span class="show-hide" id="togglePassword">&#128065;</span>
        </div>
        <div class="error-text" id="errorText"></div>
      <button type="submit" class="btn login-btn" id="loginBtn">
        <span>Login securely</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>
    <div class="login-links">
      <a href="#">Forget password?</a>
      <a href="register.html">Create new account</a>
    </div>
    <div class="social-login">
      <button class="btn google-btn">
        <span style="font-weight:800;color:#4285F4;font-size:18px;line-height:1;">G</span>
    Login with Google
</button>
    </div>
    <div class="success-text" id="successText">welcome back! Let's find lost things</div>
  </div>
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
