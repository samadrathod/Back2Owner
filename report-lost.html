<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Report Lost Item — Back2Owner</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
        <link rel="stylesheet" href="CSS/style.css">
    </head>
    <body>
        <div class="container fade-in">
            <a href="index.html" class="back-link">← Back to Listings</a>
            <h1>Report Lost Item</h1>
            <form id="lostForm" class="form-group">
                <input type="text" id="itemName" placeholder="What did you lose?" required>
                <input type="text" id="lastLocation" placeholder="Where did you last see it? (e.g. M001)" required>
                <textarea id="itemDescription" placeholder="Describe your item in detail..." required></textarea>
                <input type="file" id="itemImage" accept="image/*">
                <p class="text-muted">📷 Photo is optional but helps others identify your item</p>
                <button type="submit" class="btn btn-accent w-full">Submit Lost Report</button>
            </form>
        </div>
        <script type="module" src="js/firebase.js"></script>
        <script type="module" src="js/reportLost.js"></script>
    </body>
</html>
